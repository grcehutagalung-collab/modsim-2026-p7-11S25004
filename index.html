<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator Cerita Pendek</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 20px 40px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.5rem; }
    header span { font-size: 1.8rem; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 20px; color: #1a1a2e; border-left: 4px solid #4f46e5; padding-left: 12px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select { padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #4f46e5; }
    .btn-generate { width: 100%; padding: 13px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-generate:hover { opacity: 0.9; }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
    .loading { display: none; text-align: center; padding: 20px; color: #4f46e5; }
    .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-box { display: none; background: #f9f8ff; border: 1.5px solid #e0e0ff; border-radius: 10px; padding: 24px; margin-top: 16px; }
    .result-box h3 { font-size: 1.2rem; color: #1a1a2e; margin-bottom: 14px; }
    .result-box p { line-height: 1.8; color: #444; white-space: pre-wrap; }
    .result-meta { margin-top: 12px; font-size: 0.8rem; color: #888; }
    .error-box { display: none; background: #fff0f0; border: 1.5px solid #fcc; border-radius: 8px; padding: 14px 18px; color: #c0392b; margin-top: 12px; font-size: 0.9rem; }
    .story-list { display: flex; flex-direction: column; gap: 16px; }
    .story-item { border: 1px solid #e8e8f0; border-radius: 10px; padding: 18px 20px; background: #fafafa; }
    .story-item h4 { color: #1a1a2e; margin-bottom: 8px; }
    .story-item .preview { font-size: 0.9rem; color: #555; line-height: 1.6; max-height: 72px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .story-item-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 8px; flex-wrap: wrap; }
    .story-item-meta span { font-size: 0.78rem; color: #aaa; }
    .btn-read { background: none; border: 1px solid #4f46e5; color: #4f46e5; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .btn-read:hover { background: #f0f0ff; }
    .btn-delete { background: none; border: 1px solid #e88; color: #c0392b; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .btn-delete:hover { background: #fff0f0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: white; border-radius: 14px; padding: 32px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; }
    .modal-box h3 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 18px; padding-right: 36px; line-height: 1.4; }
    .modal-content { line-height: 1.9; color: #444; white-space: pre-wrap; font-size: 0.97rem; }
    .modal-close { position: absolute; top: 16px; right: 18px; background: #f0f0f0; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; color: #555; }
    .modal-close:hover { background: #e0e0e0; }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .pagination button { padding: 7px 14px; border: 1.5px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .pagination button:hover { border-color: #4f46e5; color: #4f46e5; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 30px; color: #aaa; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } header { padding: 16px 20px; } }
  </style>
</head>
<body>

<header>
  <span>📖</span>
  <h1>Generator Cerita Pendek</h1>
</header>

<div class="container">
  <div class="card">
    <h2>✨ Buat Cerita Baru</h2>
    <div class="form-row">
      <div class="form-group" style="grid-column: span 3;">
        <label>Tema Cerita</label>
        <input type="text" id="theme" placeholder="Contoh: petualangan di hutan, persahabatan, mimpi..." />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Genre</label>
        <select id="genre">
          <option value="fiksi">Fiksi</option>
          <option value="horor">Horor</option>
          <option value="romantis">Romantis</option>
        </select>
      </div>
      <div class="form-group">
        <label>Panjang Cerita</label>
        <select id="length">
          <option value="pendek">Pendek (~150 kata)</option>
          <option value="sedang">Sedang (~350 kata)</option>
          <option value="panjang">Panjang (~600 kata)</option>
        </select>
      </div>
      <div class="form-group" style="justify-content: flex-end;">
        <label style="visibility:hidden">-</label>
        <button class="btn-generate" id="btnGenerate" onclick="generateStory()">🚀 Generate Cerita</button>
      </div>
    </div>
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <div>Sedang membuat cerita, mohon tunggu...</div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox">
      <h3 id="resultTitle"></h3>
      <p id="resultContent"></p>
      <div class="result-meta" id="resultMeta"></div>
    </div>
  </div>

  <div class="card">
    <h2>📚 Daftar Cerita Tersimpan</h2>
    <div class="story-list" id="storyList">
      <div class="empty-state">Belum ada cerita. Generate dulu!</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Modal Baca Full -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h3 id="modalTitle"></h3>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
  const API_BASE = "http://127.0.0.1:5000";
  let currentPage = 1;
  let storiesData = {};

  async function generateStory() {
    const theme = document.getElementById("theme").value.trim();
    const genre = document.getElementById("genre").value;
    const length = document.getElementById("length").value;
    if (!theme) { showError("Tema cerita wajib diisi!"); return; }
    setLoading(true); hideResult(); hideError();
    try {
      const res = await fetch(`${API_BASE}/stories/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ theme, genre, length })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || "Terjadi kesalahan pada server."); return; }
      showResult(data);
      loadStories(1);
    } catch (err) {
      showError("Tidak dapat terhubung ke server. Pastikan backend berjalan.");
    } finally {
      setLoading(false);
    }
  }

  async function loadStories(page = 1) {
    currentPage = page;
    try {
      const res = await fetch(`${API_BASE}/stories?page=${page}&per_page=5`);
      const data = await res.json();
      renderStories(data);
    } catch (err) { console.error("Gagal memuat cerita:", err); }
  }

  function renderStories(data) {
    const list = document.getElementById("storyList");
    const pagination = document.getElementById("pagination");
    if (!data.stories || data.stories.length === 0) {
      list.innerHTML = '<div class="empty-state">Belum ada cerita tersimpan.</div>';
      pagination.innerHTML = ""; return;
    }
    // Simpan data cerita untuk modal
    data.stories.forEach(s => { storiesData[s.id] = s; });

    list.innerHTML = data.stories.map(s => `
      <div class="story-item" id="story-${s.id}">
        <h4>📄 ${escapeHtml(s.title)}</h4>
        <div class="preview">${escapeHtml(s.content)}</div>
        <div class="story-item-meta">
          <span>ID: ${s.id} &bull; ${formatDate(s.created_at)}</span>
          <div style="display:flex;gap:8px;">
            <button class="btn-read" onclick="openModal(${s.id})">📖 Baca</button>
            <button class="btn-delete" onclick="deleteStory(${s.id})">🗑 Hapus</button>
          </div>
        </div>
      </div>
    `).join("");

    const totalPages = Math.ceil(data.total / data.per_page);
    pagination.innerHTML = `
      <button onclick="loadStories(${currentPage - 1})" ${currentPage <= 1 ? "disabled" : ""}>← Prev</button>
      <span style="padding:7px 12px;font-size:0.9rem;color:#555">Halaman ${currentPage} / ${totalPages}</span>
      <button onclick="loadStories(${currentPage + 1})" ${currentPage >= totalPages ? "disabled" : ""}>Next →</button>
    `;
  }

  function openModal(id) {
    const s = storiesData[id];
    if (!s) return;
    document.getElementById("modalTitle").textContent = s.title;
    document.getElementById("modalContent").textContent = s.content;
    document.getElementById("modalOverlay").classList.add("active");
    document.body.style.overflow = "hidden";
  }

  function closeModal(event) {
    if (event.target === document.getElementById("modalOverlay")) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById("modalOverlay").classList.remove("active");
    document.body.style.overflow = "";
  }

  async function deleteStory(id) {
    if (!confirm(`Hapus cerita ID ${id}?`)) return;
    try {
      const res = await fetch(`${API_BASE}/stories/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (res.ok) { loadStories(currentPage); }
      else { alert(data.error || "Gagal menghapus."); }
    } catch (err) { alert("Tidak dapat terhubung ke server."); }
  }

  function setLoading(state) {
    document.getElementById("loading").style.display = state ? "block" : "none";
    document.getElementById("btnGenerate").disabled = state;
  }

  function showResult(data) {
    document.getElementById("resultTitle").textContent = data.title;
    document.getElementById("resultContent").textContent = data.content;
    document.getElementById("resultMeta").textContent = `ID: ${data.id} | Dibuat: ${formatDate(data.created_at)}`;
    document.getElementById("resultBox").style.display = "block";
  }

  function hideResult() { document.getElementById("resultBox").style.display = "none"; }

  function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = "⚠️ " + msg;
    box.style.display = "block";
  }

  function hideError() { document.getElementById("errorBox").style.display = "none"; }

  function formatDate(iso) {
    if (!iso) return "-";
    return new Date(iso).toLocaleString("id-ID", { dateStyle: "medium", timeStyle: "short" });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.appendChild(document.createTextNode(str || ""));
    return div.innerHTML;
  }

  loadStories(1);
</script>
</body>
</html>
